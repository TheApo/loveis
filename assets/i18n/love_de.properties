tutorial_0_move_text=Bewege dich mit den Pfeiltasten\nDruecke r, um das Level neu zu starten\nDruecke u, um den letzten Schritt rueckgaenig zu machen

editor_text=Im Editor kannst du dir selber schnell,\ndeine eigenen Levels zusammenstellen.\nDazu einfach oben ein Bild auswaehlen und\nin das Level setzen.\n\nWenn du fertig bist, kannst du das Level testen.\nDazu druecke unten den 'Test'-Knopf.\nDieser erscheint aber nur, wenn das Level\nsteuerbar und vielleicht loesbar ist.\n\nWenn du das Level geloest hast,\nkannst du dein Level hochladen und\ndann steht es jedem unter Userlevels zur Verfuegung.

tutorial_text_0=Erreiche das Ziel mit dem Objekt, welches du bist.\nEs gelten nur die Regeln, die im Level sind.
tutorial_text_1=Jede einzelne neue Regel zaehlt.
tutorial_text_2=Haeufig muss ich die Regeln erstellen,\num mein Ziel zu erreichen.
tutorial_text_3=Ich muss die Regeln brechen aehh verschieben,\num meine Liebe zu erreichen.
tutorial_text_4=Ich bin STARK!\nIch kann viele Texte gleichzeitig verschieben.
tutorial_text_5=Wer bin ich? ...\nBin ich eine echte Person?
tutorial_text_6=Manchmal bin ich einfach im falschen\nKoerper gefangen. Ich kann das aendern.
tutorial_text_7=Haeufig frage ich mich ...\nWas ist mein wirkliches Ziel?
tutorial_text_8=Regeln sind doch dafuer da ...\ngebrochen zu werden!
tutorial_text_9=Manche Herzen sind doch ...\nso hart und kalt wie ein Stein ...
tutorial_text_10=Manchmal muessen andere helfen ...\nund das Ziel gemeinsam erreichen.
tutorial_text_11=Ich sehe den Wald vor lauter ...\nHerzen einfach nicht mehr!
tutorial_text_12=Einige Steine scheinen zueinander zu gehoeren ...\nund sinken nur zusammen. Suess ...
tutorial_text_13=Was ist bloss der Schluessel, ...\num mein Ziel zu erreichen?
tutorial_text_14=
tutorial_text_15=Manchmal fuehle ich mich einfach leer
tutorial_text_16=So viele Steine versperren mir ...\nden Weg zum Glueck ...
tutorial_text_17=Was kann bloss das Eis in ...\nmeinem Herzen zum Schmelzen bringen?
tutorial_text_18=
tutorial_text_19=
tutorial_text_20=Ich gehe einfach ein, wenn ...\nmeine Ziele einfach unerreichbar sind
tutorial_text_21=
tutorial_text_22=Ich schlittere durch die Welt ...\nin der Hoffnung mein Ziel zu erreichen
