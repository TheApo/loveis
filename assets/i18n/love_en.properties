tutorial_0_move_text=Move with the cursor keys\nPress r to restart the level\nPress u to undo the last step

editor_text=With the editor you can create\nyour own levels easy and fast!\nChoose an image from above and\nplace it in the level.\n\nIf you are ready you can test the level.\nPress the test button in the hud\nThis button is visible when the level\nhas a player and it's solvable (perhaps).\n\nWhen you solved the level you can upload\nyour level and share it with the world.

tutorial_text_0=My task is to reach the goal\nwith the object that 'is you'
tutorial_text_1=Every rule counts.
tutorial_text_2=Often I have to make the rules.\nI have the power.
tutorial_text_3=I have to break the rules\nto reach my love.
tutorial_text_4=I am STRONG!\nI can move more than one text ...
tutorial_text_5=Who I am ...\nAm I a person?
tutorial_text_6=Sometimes I think ... I am caught ...\nin the wrong body. I can change it.
tutorial_text_7=Questions upon questions ...\nWhat is my real goal?
tutorial_text_8=Rules are made ...\nto be broken!
tutorial_text_9=Some hearts are hard and ...\ncold as stone
tutorial_text_10=Sometimes other things must help ...\nto reach the goal together
tutorial_text_11=Sometimes I don't see ...\nthe wood for the hearts
tutorial_text_12=Some walls are sticky ...\nand only sink together
tutorial_text_13=What is the key ...\nto reach my goals
