sourceCompatibility = 11

sourceSets.main.java.srcDirs = ["src/"]
sourceSets.main.resources.srcDirs = ["../assets"]

eclipse.project.name = appName + "-teavm"

tasks.register('buildRelease', JavaExec) {
    group = 'teavm'
    description = 'Build TeaVM release'
    mainClass.set('org.apogames.love.teavm.TeaVMBuilder')
    classpath = sourceSets.main.runtimeClasspath
    doLast {
        copy {
            from 'webapp/index.html'
            into 'build/dist/webapp'
        }
    }
}

tasks.register('run', JavaExec) {
    group = 'teavm'
    description = 'Build and run TeaVM with local server'
    mainClass.set('org.apogames.love.teavm.TeaVMBuilder')
    classpath = sourceSets.main.runtimeClasspath
    args '--serve'
    doLast {
        copy {
            from 'webapp/index.html'
            into 'build/dist/webapp'
        }
    }
}
